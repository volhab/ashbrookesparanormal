</head>
<body>
        <div><img style="width: 100%; height: auto; max-width: 100%; display: block;" src="images/AshbrookesParanormal_Title.png"/></div>
    
    <div class="row">
        <img src="images/Spiderweb.gif" alt="Spiderweb" />

        <div class="center">
            <div class="text" style="margin-bottom: 25px;">
                Documenting Ashbrooke NJ's oddities since 1999!
            </div>
            <nav>
                <a href="index.html">Home Page</a> |
                <a href="blog.html">Blog</a> |
                <a href="gallery.html">Gallery</a> |
                <a href="contact.html">Contact</a>
            </nav>
        </div>

        <img src="images/Spiderweb.gif" alt="Spiderweb" />
    </div>

    <h1>Contact us:</h1>
    
    <br />
    
    <form name="contact" method="POST" data-netlify="true" id="contact-form">
        <input type="hidden" name="form-name" value="contact" />

        <label for="email">Your Email</label><br />
        <input type="email" id="email" name="email" required /><br /><br />

        <label for="message">Message</label><br />
        <textarea id="message" name="message" required></textarea><br /><br />

        <button type="submit">Send</button>
    </form>

    <script>
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const form = e.target;
            const data = new FormData(form);

            fetch('/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams(data).toString()
            })
            .then(() => {
                window.location.href = 'thanks.html';
            })
            .catch((error) => {
                console.error('Form submission error:', error);
                alert('Something went wrong. Please try again.');
            });
        });
    </script>

</body>
</html>
